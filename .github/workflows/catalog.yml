# Build the serverless archive catalog and publish it to GitHub Pages.
#
# Runs the static exporter (gen_static.py), which reuses the catalog adapters to
# scrape/query the sources (vtrd.in, …) with a browser UA — server-side, so the
# device never touches the live site — and renders a static tree of .tsv listings
# + mirrored files. The pico-spec device then reads this over TLS (TlsSock) with
# no always-on server.
#
# SETUP: this repo is the dedicated catalog. Enable Pages with "GitHub Actions"
# as the source (Settings → Pages → Source: GitHub Actions). The daily cron then
# publishes to https://<owner>.github.io/<repo>/. vtrd's scrape selectors are
# best-effort and must be validated against the live site — until then `local`
# always works and vtrd degrades to empty listings rather than failing the build.

name: Build catalog (Pages)

on:
  schedule:
    - cron: "17 4 * * *"      # daily, 04:17 UTC
  workflow_dispatch:
    inputs:
      sites:
        description: "Space-separated site ids to export"
        default: "local vtrd"
      max_files:
        description: "Cap mirrored files per run (0 = unlimited)"
        default: "400"
      max_depth:
        description: "Max directory recursion depth"
        default: "2"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install adapter deps
        run: pip install -r requirements.txt
      - name: Export static catalog
        env:
          SITES: ${{ github.event.inputs.sites || 'local vtrd' }}
          MAX_FILES: ${{ github.event.inputs.max_files || '400' }}
          MAX_DEPTH: ${{ github.event.inputs.max_depth || '2' }}
        run: |
          args=""
          for s in $SITES; do args="$args --site $s"; done
          python3 gen_static.py \
            --out "$GITHUB_WORKSPACE/_site" $args \
            --max-files "$MAX_FILES" --max-depth "$MAX_DEPTH"
          echo "== generated tree ==" && find "$GITHUB_WORKSPACE/_site" -type f | sort | head -50
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
